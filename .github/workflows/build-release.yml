name: Build and Release Spotify RPM

on:
  schedule:
    # Run the first day every two months at 00:00 UTC
    - cron: "0 0 1 */2 *"
  workflow_dispatch:
    # Allow manual trigger
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Spotify RPM
        run: |
          chmod +x build.sh
          ./build.sh --ci

      - name: Get Spotify version
        id: version
        run: |
          RPM_FILE=$(find output -maxdepth 1 -name 'spotify-*.rpm' -type f | head -n 1)
          if [ -z "$RPM_FILE" ]; then
            echo "::error::No RPM file found in output/"
            exit 1
          fi
          VERSION=$(echo "$RPM_FILE" | grep -oP '\d+\.\d+\.\d+\.\d+\.g[a-f0-9]+')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from RPM filename"
            exit 1
          fi

          SHA256=$(sha256sum "$RPM_FILE" | awk '{print $1}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "rpm_name=$(basename $RPM_FILE)" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Spotify ${{ steps.version.outputs.version }}
          body: |
            ## Spotify RPM for Fedora

            Automated build of Spotify version `${{ steps.version.outputs.version }}`

            ### Install
            ```bash
            sudo dnf install ./spotify-*.rpm
            ```

            ### Included Fixes (still being tested)
            - GPU sandbox disabled (may help with black screen issues)
            - Seccomp filter sandbox disabled
            - Clean cache flag for better compatibility

            ### Checksum
            ```
            SHA256: ${{ steps.version.outputs.sha256 }}
            ```
          files: |
            ${{ steps.version.outputs.rpm_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: spotify-rpm-${{ steps.version.outputs.version }}
          path: output/*.rpm
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: build.log
          retention-days: 7
