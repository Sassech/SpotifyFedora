name: Build and Release Spotify RPM

on:
  schedule:
    - cron: "0 0 1 */2 *"
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: spotify-builder:fedora

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run build
        run: |
          mkdir -p output
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            ${{ env.IMAGE_NAME }}

      - name: Get Spotify version
        id: version
        run: |
          RPM_FILE=$(find output -maxdepth 1 -name 'spotify-*.rpm' -type f | head -n 1)
          if [ -z "$RPM_FILE" ]; then
            echo "::error::No RPM file found in output/"
            exit 1
          fi
          VERSION=$(echo "$RPM_FILE" | grep -oP '\d+\.\d+\.\d+\.\d+\.g[a-f0-9]+')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version"
            exit 1
          fi
          SHA256=$(sha256sum "$RPM_FILE" | awk '{print $1}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Check release
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Spotify ${{ steps.version.outputs.version }}
          body: |
            ## Spotify RPM for Fedora

            Version: `${{ steps.version.outputs.version }}`
            SHA256: `${{ steps.version.outputs.sha256 }}`

            ```bash
            sudo dnf install ./spotify-*.rpm
            ```
          files: ${{ steps.version.outputs.rpm_file }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify-rpm-${{ steps.version.outputs.version }}
          path: output/*.rpm
          retention-days: 30
